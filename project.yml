name: MiniTypeless
options:
  bundleIdPrefix: com.wetabq
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "1.9.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.14.0"
  SwiftOpenAI:
    url: https://github.com/jamesrochabrun/SwiftOpenAI
    from: "4.4.0"
  SwiftAnthropic:
    url: https://github.com/jamesrochabrun/SwiftAnthropic
    from: "2.1.0"

targets:
  MiniTypeless:
    type: application
    platform: macOS
    sources:
      - MiniTypeless
    dependencies:
      - package: KeyboardShortcuts
      - package: WhisperKit
      - package: SwiftOpenAI
      - package: SwiftAnthropic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wetabq.MiniTypeless
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MiniTypeless needs microphone access to record your voice for dictation."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "MiniTypeless uses speech recognition to convert your voice to text."
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: MiniTypeless/Resources/MiniTypeless.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: true
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_OPTIMIZATION_LEVEL: -O
    entitlements:
      path: MiniTypeless/Resources/MiniTypeless.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
